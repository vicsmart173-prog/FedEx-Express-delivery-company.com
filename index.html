<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FedEx Express Tracking</title>
<style>
body {
  margin:0;
  font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
  background:#f4f4f4;
}
.fedex-header {
  background:#4d148c;
  color:#fff;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.fedex-header .logo {
  height:50px;
}
.profile-icon svg {
  width:30px;
  height:30px;
}
.controls {
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#eee;
  flex-wrap:wrap;
}
.controls button {
  padding:12px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.controls .track-btn {
  background:#4d148c;
  color:#fff;
}
.track-form {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:20px;
  flex-wrap:wrap;
}
.track-form input {
  padding:12px;
  font-size:16px;
  border:2px solid orange;
  border-radius:5px;
  width:260px;
}
.track-form button {
  padding:12px 18px;
  background:orange;
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
}
table {
  width:95%;
  max-width:850px;
  margin:20px auto;
  border-collapse:collapse;
  display:none;
  background:#fff;
}
th, td {
  padding:10px;
  border:1px solid #ddd;
}
th {
  background:#4d148c;
  color:#fff;
}
.package-image {
  max-width:350px;
  width:100%;
  display:block;
  margin:10px auto;
  border-radius:8px;
}
footer {
  background:#4d148c;
  color:#fff;
  text-align:center;
  padding:12px;
  font-size:14px;
}
</style>
</head>
<body>

<header class="fedex-header">
  <img src="fedex-logo.png" class="logo" alt="FedEx Logo">
  <div class="profile-icon">
    <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
      <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
    </svg>
  </div>
</header>

<div class="controls">
  <button>FARES & TRANSIT</button>
  <button class="track-btn">TRACK</button>
  <button>SEND</button>
  <button>RETURN</button>
</div>

<div class="track-form">
  <input id="trackingId" placeholder="TRACKING ID">
  <button onclick="trackPackage()">TRACK →</button>
</div>

<table id="resultsTable">
  <tbody id="resultsBody"></tbody>
</table>

<footer>
© 2026 FedEx Express | All rights reserved
</footer>

<script>

function trackPackage(code=null){
  if(!code){
    code = document.getElementById("trackingId").value.trim();
  }
  const data = trackingData[code];
  const table = document.getElementById("resultsTable");
  const tbody = document.getElementById("resultsBody");

  if(!data){
    alert("❌ Invalid Tracking ID");
    return;
  }

  // Freeze input when accessed via QR
  if(code!==document.getElementById("trackingId").value){
    document.getElementById("trackingId").value="";
  }

  tbody.innerHTML=`
<tr><th colspan="2">SENDER INFORMATION</th></tr>
<tr><td>Name</td><td>${data.sender.name}</td></tr>
<tr><td>Country</td><td>${data.sender.country}</td></tr>
<tr><td>Email</td><td>${data.sender.email}</td></tr>
<tr><td>Phone</td><td>${data.sender.phone}</td></tr>

<tr><th colspan="2">RECEIVER INFORMATION</th></tr>
<tr><td>Name</td><td>${data.receiver.name}</td></tr>
<tr><td>Country</td><td>${data.receiver.country}</td></tr>
<tr><td>Email</td><td>${data.receiver.email}</td></tr>
<tr><td>Address</td><td>${data.receiver.direction}</td></tr>
<tr><td>Phone</td><td>${data.receiver.phone}</td></tr>

<tr><th colspan="2">PACKAGE STATUS</th></tr>
<tr><td>Arrival Date</td><td>${data.arrival}</td></tr>

<tr><th colspan="2">LIVE MAP</th></tr>
<tr>
  <td colspan="2" style="padding:0;">
    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;">
      <iframe   
        src="https://www.google.com/maps?q=${encodeURIComponent(data.final.map)}&output=embed"   
        style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"   
        allowfullscreen  
        loading="lazy">  
      </iframe>  
      <div style="position:absolute;bottom:8px;left:10px;color:#fff;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:4px;font-size:13px;">
        ● Arrived at destination airport
      </div>
    </div>
  </td>
</tr>

<tr><th colspan="2">PACKAGE IMAGE</th></tr>
<tr><td colspan="2"><img src="${data.image}" class="package-image"></td></tr>
`;

  table.style.display="table";
}

// Auto-load via QR
window.onload=()=>{
  const p = new URLSearchParams(window.location.search);
  const t = p.get("tracking");
  if(t && trackingData[t]){
    trackPackage(t); // Freeze input
  }
};
</script>
